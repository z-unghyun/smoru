<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>스모루 프로토타입</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*{box-sizing:border-box;-webkit-font-smoothing:antialiased;word-break:keep-all;line-break:strict;text-wrap:pretty;}
body{margin:0;font-family:"Pretendard","Apple SD Gothic Neo",-apple-system,system-ui,sans-serif;}
@keyframes floatY{0%{transform:translateY(0)}50%{transform:translateY(-9px)}100%{transform:translateY(0)}}
@keyframes pulseS{0%{transform:scale(1)}50%{transform:scale(1.02)}100%{transform:scale(1)}}
@keyframes morphSoft{0%{border-radius:60% 40% 58% 42%/55% 58% 42% 45%}50%{border-radius:52% 48% 46% 54%/50% 46% 54% 50%}100%{border-radius:60% 40% 58% 42%/55% 58% 42% 45%}}
@keyframes morphMed{0%{border-radius:64% 36% 60% 40%/58% 62% 38% 42%}50%{border-radius:47% 53% 44% 56%/52% 44% 56% 48%}100%{border-radius:64% 36% 60% 40%/58% 62% 38% 42%}}
@keyframes morphRough{0%{border-radius:72% 28% 66% 34%/64% 72% 28% 36%}50%{border-radius:38% 62% 36% 64%/44% 36% 64% 56%}100%{border-radius:72% 28% 66% 34%/64% 72% 28% 36%}}
@keyframes hlMove{0%{transform:translate(-30px,-34px) scale(.9)}50%{transform:translate(-12px,-18px) scale(1.08)}100%{transform:translate(-30px,-34px) scale(.9)}}
@keyframes haloDrift{0%{transform:translate(0,0) scale(1)}50%{transform:translate(16px,12px) scale(1.08)}100%{transform:translate(0,0) scale(1)}}
@keyframes toastIn{0%{opacity:0;transform:translate(-50%,12px)}100%{opacity:1;transform:translate(-50%,0)}}
@keyframes sheetIn{0%{transform:translateY(101%)}100%{transform:translateY(0)}}
@keyframes dimIn{0%{opacity:0}100%{opacity:1}}
.sc::-webkit-scrollbar{width:0;height:0;display:none;}
.sc{scrollbar-width:none;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js" crossorigin="anonymous"></script>
<script type="text/babel">
const { Component, createRef } = React;

class SmoluApp extends Component {
  constructor(props) {
    super(props);
    this.PAL = {
      good:   { c:['#E6FBC9','#A2E7D0','#9CC9FF'], glow:'191,234,215', scale:1.12, morph:'morphSoft 9s ease-in-out infinite' },
      normal: { c:['#D4E6C0','#B8CAC3','#AFC7E6'], glow:'168,199,230', scale:1.0,  morph:'morphMed 8s ease-in-out infinite' },
      low:    { c:['#D0C3A7','#ABAFA1','#D9CAB8'], glow:'201,184,157', scale:.86,  morph:'morphRough 6.5s ease-in-out infinite' }
    };
    this.COND = {
      good: {
        score:86, mode:'expanded',
        headline:'잘 잤어요. 오늘은 넓게 시작해도 좋아요.',
        sub:'수면 효율이 높고 회복 신호가 평소보다 좋아요.',
        reason:'수면 효율이 높고 HRV가 평소보다 좋아요. 확장 루틴도 가능해 보여요.',
        reportLead:'전반적으로 안정적인 밤이었어요. 기본보다 조금 더 해도 괜찮아요.',
        metrics:[
          {label:'총 수면시간', value:'7시간 28분', note:'목표에 거의 가까웠어요', good:true},
          {label:'수면 효율',   value:'92%',       note:'밤중에 깬 시간이 적었어요', good:true},
          {label:'회복 신호',   value:'좋음',      note:'HRV가 평소보다 높고 심박이 안정적이에요', good:true},
          {label:'깊은 수면',   value:'21%',       note:'충분한 편이었어요', good:true},
          {label:'호흡수',     value:'14회/분',    note:'평소 범위 안이에요', good:true}
        ]
      },
      normal: {
        score:72, mode:'basic',
        headline:'평소와 비슷해요. 기본 루틴으로 시작해요.',
        sub:'수면시간과 회복 신호가 평소와 비슷해요.',
        reason:'수면시간과 회복 신호가 평소와 비슷해요. 기본 루틴이 잘 맞아요.',
        reportLead:'무난한 밤이었어요. 평소 루틴을 유지하기 좋아요.',
        metrics:[
          {label:'총 수면시간', value:'6시간 51분', note:'평소와 비슷해요', good:true},
          {label:'수면 효율',   value:'84%',       note:'보통 수준이에요', good:true},
          {label:'회복 신호',   value:'보통',      note:'HRV와 심박이 평소 범위예요', good:true},
          {label:'깊은 수면',   value:'15%',       note:'평균적인 편이에요', good:true},
          {label:'호흡수',     value:'15회/분',    note:'평소 범위 안이에요', good:true}
        ]
      },
      low: {
        score:48, mode:'reduced',
        headline:'오늘은 회복이 필요해요. 가볍게 시작해볼게요.',
        sub:'수면 중 깬 시간이 평소보다 길었어요.',
        reason:'수면 중 깬 시간이 평소보다 길어, 루틴을 줄여서 시작해요.',
        reportLead:'오늘은 회복 신호가 평소보다 낮게 나타났어요. 무리하지 않아도 돼요.',
        metrics:[
          {label:'총 수면시간', value:'5시간 12분', note:'평소보다 1시간 짧았어요', good:false},
          {label:'수면 효율',   value:'73%',       note:'중간에 깬 시간이 조금 길었어요', good:false},
          {label:'회복 신호',   value:'낮음',      note:'HRV가 낮고 수면 중 심박이 높았어요', good:false},
          {label:'깊은 수면',   value:'9%',        note:'평소보다 적었어요', good:false},
          {label:'호흡수',     value:'17회/분',    note:'평소보다 조금 높았어요', good:false}
        ]
      }
    };
    this.MODE = {
      expanded: { name:'확장 루틴', color:'#7FCB9B', badgeBg:'#EAF6EE', badgeBorder:'#CDE9D6' },
      basic:    { name:'기본 루틴', color:'#AFC7B0', badgeBg:'#EEF2EC', badgeBorder:'#D9E2D7' },
      reduced:  { name:'회복 루틴', color:'#C9B89D', badgeBg:'#F4EEE3', badgeBorder:'#E6D9C4' }
    };
    this.END = 510;
    this.BASE = [
      {name:'물 한 컵',    type:'basic',      typeLabel:'기본',        dur:2,  rules:{expanded:{action:'keep'},            basic:{action:'keep'},reduced:{action:'keep'}}},
      {name:'스트레칭',    type:'basic',      typeLabel:'기본',        dur:10, rules:{expanded:{action:'replace',name:'전신 스트레칭',dur:15},basic:{action:'keep'},reduced:{action:'replace',name:'침대 스트레칭',dur:2}}},
      {name:'아침 명상',   type:'multiTimer', typeLabel:'다중 타이머', dur:10, rules:{expanded:{action:'keep'},            basic:{action:'keep'},reduced:{action:'skip'}}},
      {name:'영어 쉐도잉', type:'link',       typeLabel:'링크',        dur:10, rules:{expanded:{action:'replace',name:'긴 쉐도잉 영상',dur:20},basic:{action:'keep'},reduced:{action:'replace',name:'짧은 문장 듣기',dur:3}}},
      {name:'하루 정리',   type:'basic',      typeLabel:'기본',        dur:5,  rules:{expanded:{action:'keep'},            basic:{action:'keep'},reduced:{action:'replace',name:'짧은 정리',dur:2}}}
    ];
    this.TYPE_LABEL = {basic:'기본', alarm:'알람', multiTimer:'다중 타이머', appLaunch:'앱', link:'링크'};
    this.blobXformRef = createRef();
    this.blobSizeRef  = createRef();
    this.blobShapeRef = createRef();
    this.blobGlowRef  = createRef();
    this.homeScrollRef = createRef();
    this.state = {
      condition:'good', screen:'home', homeOverride:null, routineMode:'expanded',
      modeMenuOpen:false, reportOpen:false, taskAddOpen:false,
      toastMsg:'', toastShow:false, started:false, extraTasks:[],
      taskName:'', taskType:'basic', taskMinutes:10, alarmPhrase:'', repeatCount:4, linkUrl:'',
      ruleExpanded:'keep', ruleBasic:'keep', ruleReduced:'keep',
      repName:{expanded:'',basic:'',reduced:''}, repMin:{expanded:8,basic:8,reduced:5}
    };
  }

  componentDidMount()  { this.applyBlob(this.state.condition); }
  componentDidUpdate() { if (this.state.screen === 'home') this.applyBlob(this.state.condition); }

  timeStr(m) {
    m = ((m % 1440) + 1440) % 1440;
    const h = Math.floor(m/60), mm = m%60;
    return (h<10?'0':'')+h+':'+(mm<10?'0':'')+mm;
  }
  noDot(s) { return (s||'').replace(/\.(?=\s|$)/g,'').trim(); }

  applyBlob(k) {
    const p = this.PAL[k];
    const s = this.blobShapeRef.current;
    if (s) {
      s.style.background  = `radial-gradient(circle at 34% 26%, ${p.c[0]}, ${p.c[1]} 52%, ${p.c[2]} 100%)`;
      s.style.boxShadow   = `0 30px 60px -18px rgba(${p.glow},.6),0 0 46px rgba(${p.glow},.45),inset 0 -20px 44px rgba(120,150,170,.3),inset 10px 14px 32px rgba(255,255,255,.6)`;
      s.style.animation   = p.morph;
    }
    const g = this.blobGlowRef.current;
    if (g) {
      g.style.background = `radial-gradient(circle at 50% 62%, rgb(${p.glow}), transparent 68%)`;
      g.style.opacity    = k === 'low' ? '.55' : '.85';
    }
    const z = this.blobSizeRef.current;
    if (z) z.style.transform = `scale(${p.scale})`;
  }

  onHomeScroll = (e) => {
    const p = Math.min(e.target.scrollTop / 300, 1);
    const el = this.blobXformRef.current;
    if (el) {
      el.style.transform    = `scale(${1-0.6*p}) translate(${-110*p}px,${-12*p}px)`;
      el.style.opacity      = String(1-0.92*p);
      el.style.pointerEvents = p > 0.5 ? 'none' : 'auto';
    }
  }

  setCond(k) {
    this.setState({condition:k, homeOverride:null, routineMode:this.COND[k].mode, started:false}, () => {
      this.applyBlob(k);
      if (this.homeScrollRef.current) {
        this.homeScrollRef.current.scrollTop = 0;
        const el = this.blobXformRef.current;
        if (el) { el.style.transform=''; el.style.opacity='1'; el.style.pointerEvents='auto'; }
      }
    });
  }

  toast(msg) {
    this.setState({toastMsg:msg, toastShow:true});
    clearTimeout(this._tt);
    this._tt = setTimeout(() => this.setState({toastShow:false}), 1900);
  }

  schedule(modeKey) {
    const all = [...this.BASE, ...this.state.extraTasks];
    const items = all.map(t => {
      const r = t.rules[modeKey] || {action:'keep'};
      if (r.action==='skip') return {...t, skipped:true, status:'생략'};
      const dur  = r.action==='replace' ? r.dur  : t.dur;
      const name = r.action==='replace' ? (r.name||t.name) : t.name;
      return {...t, name, dur, status:r.action==='replace'?'대체':'유지', skipped:false};
    });
    const total = items.filter(t=>!t.skipped).reduce((s,t)=>s+t.dur,0);
    let cur = this.END - total;
    const tasks = items.map(t => {
      if (t.skipped) return {...t, rangeStr:''};
      const s=cur, e=cur+t.dur; cur=e;
      return {...t, rangeStr:this.timeStr(s)+'–'+this.timeStr(e)};
    });
    return {tasks, total, startStr:this.timeStr(this.END-total)};
  }

  buildTimeline(modeKey) {
    const mc = this.MODE[modeKey].color;
    return this.schedule(modeKey).tasks.map(t => ({
      ...t,
      dotBg:       t.skipped ? '#fff'     : mc,
      dotBorder:   t.skipped ? '#D8D4CC'  : mc,
      cardOpacity: t.skipped ? '.6'       : '1',
      nameColor:   t.skipped ? '#9FA69B'  : '#151713',
      strike:      t.skipped ? 'line-through' : 'none',
      statusColor: t.status==='생략'?'#9FA69B': t.status==='대체'?'#9A6D3A':'#426B4D',
      statusBg:    t.status==='생략'?'#F1EFEA': t.status==='대체'?'#F6EEE2':'#EAF3EC'
    }));
  }

  render() {
    const st = this.state;
    const cond = this.COND[st.condition];
    const recMode  = cond.mode;
    const homeMode = st.homeOverride || recMode;
    const hm       = this.MODE[homeMode];
    const homeSch  = this.schedule(homeMode);
    const routineMeta = this.MODE[st.routineMode];
    const routineSch  = this.schedule(st.routineMode);
    const scoreColor  = st.condition==='good'?'#5FBF86': st.condition==='normal'?'#9BB59C':'#B49E78';
    const rmColor = m => st.routineMode===m ? routineMeta.color : '#9FA69B';
    const condIdx = {good:0,normal:1,low:2}[st.condition];
    const routineIdx = {reduced:0,basic:1,expanded:2}[st.routineMode];
    const headlineLines = cond.headline.split('.').map(s=>s.trim()).filter(Boolean);
    const homePreview   = homeSch.tasks.filter(t=>!t.skipped).slice(0,3);
    const routineTasks  = this.buildTimeline(st.routineMode);

    // History grid
    const hist = [];
    for (let i=0;i<1;i++) hist.push({label:'',cellBg:'transparent',dot:'transparent',dotOp:0,numColor:'transparent'});
    const dotColors=['#7FCB9B','#AFC7B0','#C9B89D','#A8C7E6','#BFEAD7'];
    for (let d=1;d<=30;d++) {
      const future=d>22, today=d===22, seed=(d*37)%5;
      hist.push({label:String(d), cellBg:today?'#EAF6EE':'transparent',
        dot:future?'#ECEBE8':dotColors[seed], dotOp:future?.5:1,
        numColor:today?'#426B4D':future?'#C8C6BF':'#6E746A'});
    }

    // Type tiles
    const typeTiles = [['basic','기본'],['alarm','알람'],['multiTimer','다중'],['appLaunch','앱'],['link','링크']].map(([k,label])=>{
      const sel = st.taskType===k;
      return {k, label,
        border:sel?'#7FCB9B':'#E4E1DC', bg:sel?'#EAF6EE':'#fff',
        iconColor:sel?'#426B4D':'#9FA69B', labelColor:sel?'#426B4D':'#6E746A',
        onPick:()=>this.setState({taskType:k})};
    });

    // Mode rule rows
    const modeRuleRows = [['expanded','확장','ruleExpanded','#7FCB9B'],['basic','기본','ruleBasic','#AFC7B0'],['reduced','축소','ruleReduced','#C9B89D']].map(([mk,label,field,color])=>{
      const cur = st[field];
      return {mk, label, color, cur, isReplace:cur==='replace',
        repName:st.repName[mk], repMin:st.repMin[mk],
        onName:  e=>this.setState({repName:{...st.repName,[mk]:e.target.value}}),
        minusMin:()=>this.setState({repMin:{...st.repMin,[mk]:Math.max(1,st.repMin[mk]-1)}}),
        plusMin: ()=>this.setState({repMin:{...st.repMin,[mk]:st.repMin[mk]+1}}),
        opts:[['keep','유지'],['replace','대체'],['skip','생략']].map(([ok,olabel])=>{
          const osel=cur===ok;
          return {ok,olabel, border:osel?color:'#E8E5DF', bg:osel?color+'2e':'#fff', color:osel?'#151713':'#9FA69B',
            onPick:()=>this.setState({[field]:ok})};
        })};
    });

    const desc=(field,mk)=>{const a=st[field];if(a==='keep')return '유지('+st.taskMinutes+'분)';if(a==='skip')return '생략';return '대체('+st.repMin[mk]+'분)';};
    const nm = st.taskName.trim()||'새 태스크';
    const previewSentence = `"${nm}" · ${this.TYPE_LABEL[st.taskType]} · 확장 ${desc('ruleExpanded','expanded')} / 기본 ${desc('ruleBasic','basic')} / 축소 ${desc('ruleReduced','reduced')}`;
    const canAdd = st.taskName.trim().length>0 && st.taskMinutes>0;

    const TC = '#151713'; // top color

    return (
      <div style={{minHeight:'100vh',width:'100%',display:'flex',alignItems:'center',justifyContent:'center',background:'radial-gradient(120% 80% at 50% 0%, #efece6 0%, #e3e0d9 60%, #dcd8d0 100%)',padding:'40px 20px'}}>
        {/* iPhone frame */}
        <div style={{position:'relative',width:'393px',height:'852px',borderRadius:'56px',background:'#0b0d10',padding:'13px',boxShadow:'0 2px 6px rgba(0,0,0,.3),0 30px 70px -20px rgba(0,0,0,.5)',flex:'none'}}>
          <div style={{position:'absolute',top:'13px',left:'50%',transform:'translateX(-50%)',width:'122px',height:'34px',background:'#0b0d10',borderRadius:'0 0 20px 20px',zIndex:60}}/>

          <div style={{position:'relative',width:'100%',height:'100%',borderRadius:'44px',overflow:'hidden',background:'#FAF4EF'}}>

            {/* Status bar */}
            <div style={{position:'absolute',top:0,left:0,right:0,height:'54px',zIndex:40,display:'flex',alignItems:'flex-end',justifyContent:'space-between',padding:'0 30px 8px',pointerEvents:'none'}}>
              <span style={{fontSize:'15px',fontWeight:600,color:TC,letterSpacing:'.3px'}}>9:41</span>
              <span style={{display:'flex',alignItems:'center',gap:'7px'}}>
                <svg width="18" height="11" viewBox="0 0 18 11"><rect x="0" y="7" width="3" height="4" rx="1" fill={TC}/><rect x="4.5" y="5" width="3" height="6" rx="1" fill={TC}/><rect x="9" y="2.5" width="3" height="8.5" rx="1" fill={TC}/><rect x="13.5" y="0" width="3" height="11" rx="1" fill={TC}/></svg>
                <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><path d="M8.5 3.2c2 0 3.8.8 5.1 2M8.5 3.2c-2 0-3.8.8-5.1 2M8.5 6.6c1.1 0 2.1.45 2.8 1.2M8.5 6.6c-1.1 0-2.1.45-2.8 1.2" stroke={TC} strokeWidth="1.4" strokeLinecap="round"/><circle cx="8.5" cy="10" r="1" fill={TC}/></svg>
                <svg width="26" height="12" viewBox="0 0 26 12"><rect x="0.5" y="0.5" width="21" height="11" rx="3" fill="none" stroke={TC} strokeOpacity=".4"/><rect x="2" y="2" width="17" height="8" rx="1.5" fill={TC}/><rect x="23" y="3.5" width="1.6" height="5" rx="1" fill={TC} fillOpacity=".5"/></svg>
              </span>
            </div>

            {/* ── HOME ── */}
            {st.screen==='home' && (
              <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column'}}>
                <div style={{position:'absolute',top:'-40px',left:'-30px',width:'320px',height:'300px',borderRadius:'50%',background:'radial-gradient(circle,rgba(191,234,215,.55),transparent 65%)',filter:'blur(8px)',animation:'haloDrift 14s ease-in-out infinite',pointerEvents:'none'}}/>
                <div style={{position:'absolute',top:'20px',right:'-60px',width:'280px',height:'260px',borderRadius:'50%',background:'radial-gradient(circle,rgba(243,166,200,.32),transparent 65%)',filter:'blur(8px)',animation:'haloDrift 18s ease-in-out infinite reverse',pointerEvents:'none'}}/>

                {/* Date + condition toggle */}
                <div style={{position:'relative',zIndex:30,padding:'60px 24px 10px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <div style={{fontSize:'20px',fontWeight:700,color:'#151713',letterSpacing:'-.3px'}}>6월 22일 일요일</div>
                  <div style={{position:'relative',display:'flex',background:'#EDEAE3',borderRadius:'999px',padding:'3px'}}>
                    <div style={{position:'absolute',top:'3px',left:'3px',width:'calc((100% - 6px)/3)',height:'calc(100% - 6px)',background:'#fff',borderRadius:'999px',boxShadow:'0 1px 4px rgba(0,0,0,.12)',transition:'transform .28s cubic-bezier(.3,.8,.3,1)',transform:`translateX(${condIdx*100}%)`}}/>
                    {[['good','좋음'],['normal','보통'],['low','낮음']].map(([k,label])=>(
                      <button key={k} onClick={()=>this.setCond(k)} style={{position:'relative',zIndex:1,border:0,background:'none',cursor:'pointer',fontFamily:'inherit',fontSize:'11px',fontWeight:600,whiteSpace:'nowrap',color:st.condition===k?'#151713':'#9FA69B',padding:'5px 12px'}}>{label}</button>
                    ))}
                  </div>
                </div>

                {/* Scrollable content */}
                <div ref={this.homeScrollRef} onScroll={this.onHomeScroll} className="sc" style={{position:'relative',zIndex:20,flex:1,overflowY:'auto',overflowX:'hidden'}}>
                  {/* Blob */}
                  <div style={{height:'368px',display:'flex',alignItems:'center',justifyContent:'center',position:'relative'}}>
                    <div style={{position:'sticky',top:'8px',display:'flex',justifyContent:'center'}}>
                      <div ref={this.blobXformRef} style={{willChange:'transform',transformOrigin:'center top'}}>
                        <div style={{animation:'floatY 5.5s ease-in-out infinite'}}>
                          <div style={{animation:'pulseS 6.8s ease-in-out infinite'}}>
                            <div ref={this.blobSizeRef} style={{transform:'scale(1.12)',transition:'transform .5s ease'}}>

                      <div key={i} style={{background:'#fff',borderRadius:'18px',padding:'16px 18px'}}>
                        <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between'}}>
                          <span style={{fontSize:'13px',fontWeight:600,color:'#6E746A'}}>{m.label}</span>
                          <span style={{fontSize:'18px',fontWeight:700,color:m.good?'#426B4D':'#9A6D3A'}}>{m.value}</span>
                        </div>
                        <div style={{fontSize:'13px',color:'#9FA69B',marginTop:'5px',lineHeight:1.45}}>{this.noDot(m.note)}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{marginTop:'14px',background:hm.badgeBg,borderRadius:'18px',padding:'16px 18px'}}>
                    <div style={{fontSize:'13px',fontWeight:700,color:'#426B4D'}}>오늘 루틴 추천 이유</div>
                    <div style={{fontSize:'14px',color:'#3a3f37',marginTop:'5px',lineHeight:1.5}}>{this.noDot(cond.reason)}</div>
                  </div>
                  <div style={{fontSize:'11px',color:'#bcbcb2',marginTop:'14px',lineHeight:1.5,textAlign:'center'}}>스모루는 의료 진단을 제공하지 않아요 · 수면 컨디션은 참고용이에요</div>
                </div>
              </div>
            )}

            {/* ── TASK ADD ── */}
            {st.taskAddOpen && (
              <div onClick={()=>this.setState({taskAddOpen:false})} style={{position:'absolute',inset:0,zIndex:95,background:'rgba(10,12,12,.34)',animation:'dimIn .2s ease',display:'flex',alignItems:'flex-end'}}>
                <div onClick={e=>e.stopPropagation()} className="sc" style={{width:'100%',height:'92%',overflowY:'auto',background:'#FAF4EF',borderRadius:'28px 28px 0 0',animation:'sheetIn .36s cubic-bezier(.2,.8,.2,1)'}}>
                  <div style={{position:'sticky',top:0,zIndex:5,background:'#FAF4EF',padding:'10px 20px 12px',borderBottom:'1px solid #EFECE6'}}>
                    <div style={{width:'40px',height:'5px',borderRadius:'3px',background:'#E4E1DC',margin:'0 auto 12px'}}/>
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                      <button onClick={()=>this.setState({taskAddOpen:false})} style={{border:0,background:'none',cursor:'pointer',fontFamily:'inherit',fontSize:'14px',color:'#9FA69B',fontWeight:600}}>닫기</button>
                      <span style={{fontSize:'17px',fontWeight:700,color:'#151713'}}>태스크 추가</span>
                      <span style={{width:'32px'}}/>
                    </div>
                  </div>

                  <div style={{padding:'18px 20px 0'}}>
                    <div style={{fontSize:'13px',fontWeight:700,color:'#6E746A',marginBottom:'8px'}}>태스크 이름</div>
                    <input value={st.taskName} onChange={e=>this.setState({taskName:e.target.value})} placeholder="예: 아침 스트레칭" style={{width:'100%',height:'52px',border:'1.5px solid #E4E1DC',borderRadius:'15px',background:'#fff',padding:'0 16px',fontFamily:'inherit',fontSize:'16px',color:'#151713',outline:'none'}}/>

                    <div style={{fontSize:'13px',fontWeight:700,color:'#6E746A',margin:'20px 0 8px'}}>태스크 종류</div>
                    <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:'7px'}}>
                      {typeTiles.map(ty=>(
                        <button key={ty.k} onClick={ty.onPick} style={{border:`1.5px solid ${ty.border}`,background:ty.bg,borderRadius:'14px',padding:'11px 4px 9px',cursor:'pointer',fontFamily:'inherit',display:'flex',flexDirection:'column',alignItems:'center',gap:'5px'}}>
                          <span style={{color:ty.iconColor}}>
                            {ty.k==='basic'      && <svg width="20" height="20" viewBox="0 0 22 22" fill="none"><path d="M11 3a6 6 0 0 0-6 6c0 3-1.5 4-1.5 4h15S17 12 17 9a6 6 0 0 0-6-6Z" stroke="currentColor" strokeWidth="1.6" strokeLinejoin="round"/><path d="M9.5 16a1.5 1.5 0 0 0 3 0" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/></svg>}
                            {ty.k==='alarm'      && <svg width="20" height="20" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="12" r="7" stroke="currentColor" strokeWidth="1.6"/><path d="M11 9v3.2l2 1.3M4 6 6.5 4M18 6l-2.5-2" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/></svg>}
                            {ty.k==='multiTimer' && <svg width="20" height="20" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="7.5" stroke="currentColor" strokeWidth="1.6"/><path d="M11 6.5V11l3 2" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/><path d="M11 1.5v2M1.5 11h2" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/></svg>}
                            {ty.k==='appLaunch'  && <svg width="20" height="20" viewBox="0 0 22 22" fill="none"><rect x="3.5" y="3.5" width="6.5" height="6.5" rx="2" stroke="currentColor" strokeWidth="1.6"/><rect x="12" y="3.5" width="6.5" height="6.5" rx="2" stroke="currentColor" strokeWidth="1.6"/><rect x="3.5" y="12" width="6.5" height="6.5" rx="2" stroke="currentColor" strokeWidth="1.6"/><rect x="12" y="12" width="6.5" height="6.5" rx="2" stroke="currentColor" strokeWidth="1.6"/></svg>}
                            {ty.k==='link'       && <svg width="20" height="20" viewBox="0 0 22 22" fill="none"><path d="M9 13a3.5 3.5 0 0 0 5 0l2.5-2.5a3.5 3.5 0 0 0-5-5L10 7" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/><path d="M13 9a3.5 3.5 0 0 0-5 0l-2.5 2.5a3.5 3.5 0 0 0 5 5L12 15" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/></svg>}
                          </span>
                          <span style={{fontSize:'11px',fontWeight:600,color:ty.labelColor}}>{ty.label}</span>
                        </button>
                      ))}
                    </div>

                    {/* Duration + type-specific */}
                    <div style={{marginTop:'18px',background:'#fff',borderRadius:'18px',padding:'16px'}}>
                      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                        <span style={{fontSize:'14px',fontWeight:600,color:'#2a2e27'}}>소요 시간</span>
                        <div style={{display:'flex',alignItems:'center',gap:'14px'}}>
                          <button onClick={()=>this.setState({taskMinutes:Math.max(1,st.taskMinutes-1)})} style={{width:'34px',height:'34px',border:'1px solid #E4E1DC',borderRadius:'10px',background:'#fff',cursor:'pointer',fontSize:'20px',color:'#426B4D',lineHeight:1}}>−</button>
                          <span style={{fontSize:'17px',fontWeight:700,color:'#151713',minWidth:'46px',textAlign:'center'}}>{st.taskMinutes}분</span>
                          <button onClick={()=>this.setState({taskMinutes:st.taskMinutes+1})} style={{width:'34px',height:'34px',border:'1px solid #E4E1DC',borderRadius:'10px',background:'#fff',cursor:'pointer',fontSize:'20px',color:'#426B4D',lineHeight:1}}>+</button>
                        </div>
                      </div>
                      {st.taskType==='alarm' && (
                        <div style={{marginTop:'14px',borderTop:'1px solid #F3F1EC',paddingTop:'14px'}}>
                          <div style={{fontSize:'13px',fontWeight:600,color:'#6E746A',marginBottom:'7px'}}>읽어줄 문구</div>
                          <input value={st.alarmPhrase} onChange={e=>this.setState({alarmPhrase:e.target.value})} placeholder="일어날 시간이에요" style={{width:'100%',height:'44px',border:'1.5px solid #E4E1DC',borderRadius:'12px',padding:'0 13px',fontFamily:'inherit',fontSize:'14px',outline:'none'}}/>
                        </div>
                      )}
                      {st.taskType==='multiTimer' && (
                        <div style={{marginTop:'14px',borderTop:'1px solid #F3F1EC',paddingTop:'14px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                          <span style={{fontSize:'13px',fontWeight:600,color:'#6E746A'}}>반복</span>
                          <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                            <button onClick={()=>this.setState({repeatCount:Math.max(1,st.repeatCount-1)})} style={{width:'30px',height:'30px',border:'1px solid #E4E1DC',borderRadius:'9px',background:'#fff',cursor:'pointer',color:'#426B4D'}}>−</button>
                            <span style={{fontSize:'15px',fontWeight:700,color:'#151713'}}>{st.repeatCount}회</span>
                            <button onClick={()=>this.setState({repeatCount:st.repeatCount+1})} style={{width:'30px',height:'30px',border:'1px solid #E4E1DC',borderRadius:'9px',background:'#fff',cursor:'pointer',color:'#426B4D'}}>+</button>
                          </div>
                        </div>
                      )}
                      {st.taskType==='link' && (
                        <div style={{marginTop:'14px',borderTop:'1px solid #F3F1EC',paddingTop:'14px'}}>
                          <div style={{fontSize:'13px',fontWeight:600,color:'#6E746A',marginBottom:'7px'}}>링크</div>
                          <input value={st.linkUrl} onChange={e=>this.setState({linkUrl:e.target.value})} placeholder="https://" style={{width:'100%',height:'44px',border:'1.5px solid #E4E1DC',borderRadius:'12px',padding:'0 13px',fontFamily:'inherit',fontSize:'14px',outline:'none'}}/>
                        </div>
                      )}
                    </div>

                    {/* Mode rules */}
                    <div style={{fontSize:'13px',fontWeight:700,color:'#6E746A',margin:'20px 0 4px'}}>컨디션별 동작</div>
                    <div style={{fontSize:'12px',color:'#9FA69B',marginBottom:'10px'}}>각 모드에서 이 태스크가 어떻게 바뀔지 정해요</div>
                    <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
                      {modeRuleRows.map(r=>(
                        <div key={r.mk} style={{background:'#fff',borderRadius:'16px',padding:'14px'}}>
                          <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'10px'}}>
                            <span style={{width:'9px',height:'9px',borderRadius:'50%',background:r.color}}/>
                            <span style={{fontSize:'14px',fontWeight:700,color:'#151713'}}>{r.label}</span>
                          </div>
                          <div style={{display:'flex',gap:'6px'}}>
                            {r.opts.map(o=>(
                              <button key={o.ok} onClick={o.onPick} style={{flex:1,border:`1.5px solid ${o.border}`,background:o.bg,color:o.color,borderRadius:'11px',padding:'9px 0',cursor:'pointer',fontFamily:'inherit',fontSize:'13px',fontWeight:700}}>{o.olabel}</button>
                            ))}
                          </div>
                          {r.isReplace && (
                            <div style={{display:'flex',gap:'8px',marginTop:'10px'}}>
                              <input value={r.repName} onChange={r.onName} placeholder="대체 이름" style={{flex:1,height:'42px',border:'1.5px solid #E4E1DC',borderRadius:'11px',padding:'0 12px',fontFamily:'inherit',fontSize:'13px',outline:'none'}}/>
                              <div style={{display:'flex',alignItems:'center',gap:'8px',border:'1.5px solid #E4E1DC',borderRadius:'11px',padding:'0 10px',background:'#fff'}}>
                                <button onClick={r.minusMin} style={{border:0,background:'none',cursor:'pointer',fontSize:'17px',color:'#426B4D'}}>−</button>
                                <span style={{fontSize:'13px',fontWeight:700,color:'#151713',minWidth:'30px',textAlign:'center'}}>{r.repMin}분</span>
                                <button onClick={r.plusMin} style={{border:0,background:'none',cursor:'pointer',fontSize:'17px',color:'#426B4D'}}>+</button>
                              </div>
                            </div>
                          )}
                        </div>
                      ))}
                    </div>

                    {/* Preview */}
                    <div style={{marginTop:'18px',background:'#EEF4EC',border:'1px solid #DDE8DC',borderRadius:'16px',padding:'15px 16px'}}>
                      <div style={{fontSize:'12px',fontWeight:700,color:'#426B4D',marginBottom:'6px'}}>미리보기</div>
                      <div style={{fontSize:'14px',color:'#2a2e27',lineHeight:1.55}}>{previewSentence}</div>
                    </div>
                    <div style={{height:'20px'}}/>
                  </div>

                  <div style={{position:'sticky',bottom:0,background:'linear-gradient(to top,#FAF4EF 70%,transparent)',padding:'12px 20px 24px'}}>
                    <button onClick={()=>{
                      if (!canAdd) return;
                      const ruleFor=(a,mk)=>{if(a==='keep')return {action:'keep'};if(a==='skip')return {action:'skip'};return {action:'replace',name:st.repName[mk]||st.taskName,dur:st.repMin[mk]};};
                      const task={name:st.taskName.trim(),type:st.taskType,typeLabel:this.TYPE_LABEL[st.taskType],dur:st.taskMinutes,
                        rules:{expanded:ruleFor(st.ruleExpanded,'expanded'),basic:ruleFor(st.ruleBasic,'basic'),reduced:ruleFor(st.ruleReduced,'reduced')}};
                      this.setState({extraTasks:[...st.extraTasks,task],taskAddOpen:false,taskName:'',taskType:'basic',taskMinutes:10,
                        alarmPhrase:'',linkUrl:'',ruleExpanded:'keep',ruleBasic:'keep',ruleReduced:'keep',
                        repName:{expanded:'',basic:'',reduced:''},repMin:{expanded:8,basic:8,reduced:5}});
                      this.toast('태스크를 추가했어요');
                    }} style={{width:'100%',height:'54px',border:0,borderRadius:'18px',background:canAdd?'#7FCB9B':'#D6D2CA',color:'#fff',fontFamily:'inherit',fontSize:'16px',fontWeight:700,cursor:canAdd?'pointer':'default',boxShadow:'0 8px 18px -8px rgba(127,203,155,.6)'}}>태스크 추가</button>
                  </div>
                </div>
              </div>
            )}

            {/* Home indicator */}
            <div style={{position:'absolute',bottom:'8px',left:'50%',transform:'translateX(-50%)',width:'134px',height:'5px',borderRadius:'3px',background:'#151713',zIndex:70,opacity:.85}}/>
          </div>
        </div>
      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<SmoluApp/>);
</script>
</body>
</html>
